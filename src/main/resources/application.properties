spring.profiles.active=local
spring.application.name=api-saldo-cliente
seguranca.jwt.segredo-assinatura=${SEGURANCA_JWT_SEGREDO_ASSINATURA:segredo-jwt-api-saldo-cliente-2026-chave-segura}

# Configurações reais devem usar variáveis de ambiente e secret manager.
# Exemplos de placeholders para ambiente real:
# saldo.integracao.nfs.caminho=${SALDO_NFS_CAMINHO:}
# saldo.integracao.aws.sns.topic-arn=${SALDO_AWS_SNS_TOPIC_ARN:}
# saldo.integracao.mq.fila-atualizacao=${SALDO_MQ_FILA_ATUALIZACAO:}

# Segurança JWT via Spring Security OAuth2 Resource Server.
# Externalize estes parâmetros em produção (application.properties externo,
# variáveis de ambiente e/ou secret manager), evitando hardcode de segredo.
seguranca.jwt.habilitado=false
seguranca.jwt.issuer=${SEGURANCA_JWT_ISSUER:}
seguranca.jwt.jwk-set-uri=${SEGURANCA_JWT_JWK_SET_URI:}
seguranca.jwt.chave-publica-pem=${SEGURANCA_JWT_CHAVE_PUBLICA_PEM:}
seguranca.jwt.audience=${SEGURANCA_JWT_AUDIENCE:}
seguranca.jwt.tolerancia-clock-skew=30s

# Batch de saldos (arquivo local).
# Em produção, saldo.batch.diretorio-entrada apontaria para mount NFS/EFS/volume equivalente.
# Endpoint/credenciais/secrets devem vir de IAM, secret manager e variáveis de ambiente.
saldo.batch.diretorio-entrada=${SALDO_BATCH_DIRETORIO_ENTRADA:./data}
saldo.batch.nome-arquivo=${SALDO_BATCH_NOME_ARQUIVO:saldo-consolidado.csv}

# Mensageria de atualização de saldo (simulada para este desafio).
# Em projeto real, host/channel/queue manager seriam usados por um client IBM MQ/JMS.
saldo.integracao.mq.host=${SALDO_MQ_HOST:localhost}
saldo.integracao.mq.porta=${SALDO_MQ_PORTA:1414}
saldo.integracao.mq.channel=${SALDO_MQ_CHANNEL:DEV.APP.SVRCONN}
saldo.integracao.mq.queue-manager=${SALDO_MQ_QUEUE_MANAGER:QM1}
saldo.integracao.mq.fila-atualizacao=${SALDO_MQ_FILA_ATUALIZACAO:FILA.SALDO.ATUALIZADO}

# Credenciais técnicas: usar variáveis de ambiente e secret manager em produção.
saldo.integracao.mq.usuario=${SALDO_MQ_USUARIO:usuario-tecnico}
saldo.integracao.mq.senha=${SALDO_MQ_SENHA:senha-nao-utilizada-neste-desafio}
saldo.integracao.mq.segredo-referencia=${SALDO_MQ_SEGREDO_REFERENCIA:aws-secretsmanager://saldo/mq/credenciais}

# Publicação de evento de integração de saldo atualizado.
# local: log estruturado (default) | sns: adapter AWS esqueleto.
saldo.integracao.evento.publicador=${SALDO_EVENTO_PUBLICADOR:log}
saldo.integracao.aws.sns.topic-arn=${SALDO_AWS_SNS_TOPIC_ARN:}
